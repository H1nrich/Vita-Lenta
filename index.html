<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sondaggio Gruppo</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>Sondaggio del Gruppo</h1>
      <p class="subtitle">Rispondi alle domande scegliendo una persona per ogni voce. Non puoi votare te stesso.</p>
    </header>

    <section class="form-area" aria-labelledby="form-title">
      <label class="field">
        <span class="label">Seleziona il tuo nome (obbligatorio)</span>
        <select id="voterSelect" class="select" aria-label="Seleziona il tuo nome">
          <option value="" disabled selected>-- scegli il tuo nome --</option>
        </select>
      </label>

      <div id="questions" class="questions" aria-live="polite"></div>

      <div class="actions">
        <button id="submitBtn" class="btn primary">Invia voto</button>
        <button id="resetBtn" class="btn ghost">Reset locale</button>
      </div>
    </section>

    <section class="results-area" aria-labelledby="results-title">
      <h2 id="results-title">Risultati (aggiornati)</h2>
      <div id="results" class="results-grid" aria-live="polite"></div>
    </section>
  </main>

<script>
/* =========================
   CONFIGURAZIONE
   ========================= */
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyizCFVugYnqH_dbEPytdHBXUbrXJ8rWRo7z2rYXz5GVRaqwNoesVSCYidTfnZEvNX2/exec';
const REFRESH_INTERVAL_MS = 10000;

const people = [
  "Gaetano Orefice","Daniela Parascandolo","Aurora Orefice","Enrico Scolastico",
  "Gianpiero Fasulo","Federica Devastato","Eleonora Galdi","Fabio Vassallo",
  "Fabio Sivero","Luigi De Simone","Chiara Vassallo"
];

const questions = [
  "Chi fa la miglior sciarpata?",
  "Chi ha i gusti migliori col cibo?",
  "Chi ha i gusti peggiori col cibo?",
  "Chi è il più austico / riservato?",
  "Chi è il miglior guidatore?",
  "Chi è il peggior guidatore?",
  "Chi è più schietto?",
  "Chi è più ingenuo o poco sveglio?",
  "Chi è più partecipe/componente del gruppo?",
  "Chi mangia di più?",
  "Chi mangia di meno?",
  "Chi è più affidabile?",
  "Chi è il meno affidabile?",
  "A chi lascereste i vostri figli?",
  "A chi non lascereste i vostri figli?",
  "Chi chiamereste in una situazione di necessità che sicuramente risponderebbe?",
  "Chi non provereste nemmeno a chiamare in una situazione di necessità?",
  "A chi affidereste la vostra macchina?",
  "Di chi vi fidate di più / chi vi ispira più fiducia?",
  "Con chi vi sentite più sintonia (escludere partner e fratelli/sorelle)?",
  "Con chi vorreste stringere di più il vostro rapporto di amicizia?",
  "Con chi passereste le serate più pazze/esotiche?",
  "Con chi fareste un viaggio?",
  "Chi secondo voi ha il cognome più divertente?",
  "Chi secondo voi ha il nome più bello?",
  "Chi vincerebbe a una gara di canto?",
  "Chi vincerebbe a una gara di Karaoke?",
  "Chi vincerebbe a una gara di stand-up comedy?"
];

const palette = ['#FF6B6B','#4ECDC4','#FFD93D','#5568FE','#FF8C42','#9B5DE5','#00C2A8','#FF6FD8','#8AC926','#00A6FB','#F72585'];
const colorMap = {};
people.forEach((p,i)=> colorMap[p]=palette[i%palette.length]);


/* =========================
   BUILD UI
   ========================= */
function buildUI(){
  const voter = document.getElementById('voterSelect');
  people.forEach(p=> {
    const opt = document.createElement('option');
    opt.value=p; opt.textContent=p;
    voter.appendChild(opt);
  });

  const qdiv = document.getElementById('questions');
  qdiv.innerHTML = '';

  questions.forEach((q,qi)=>{
    const box = document.createElement('div');
    box.className='question card';

    const h = document.createElement('div');
    h.className='qtitle';
    h.textContent = (qi+1)+'. '+q;
    box.appendChild(h);

    const options = document.createElement('div');
    options.className='options';

    people.forEach(p=>{
      const id = `q${qi}_` + p.replace(/\s+/g,'_');
      const label = document.createElement('label');
      label.className='option';
      label.setAttribute('for', id);

      const r = document.createElement('input');
      r.type='radio'; r.name='q'+qi; r.value=p; r.id=id;

      const dot = document.createElement('span');
      dot.className='dot';
      dot.style.background=colorMap[p];

      const txt = document.createElement('span');
      txt.className='opt-text';
      txt.textContent = p;

      label.appendChild(r);
      label.appendChild(dot);
      label.appendChild(txt);

      label.addEventListener('click', ()=>{
        if(!r.disabled){
          r.checked = true;
          r.dispatchEvent(new Event('change', { bubbles: true }));
        }
      });

      options.appendChild(label);
    });

    box.appendChild(options);
    qdiv.appendChild(box);
  });
}

/* =========================
   DISABILITA AUTO-VOTO
   ========================= */
document.getElementById('voterSelect').addEventListener('change', ()=>{
  const voter = document.getElementById('voterSelect').value;

  questions.forEach((q,qi)=>{
    people.forEach(p=>{
      const id = `q${qi}_` + p.replace(/\s+/g,'_');
      const inputEl = document.getElementById(id);
      if (!inputEl) return;

      inputEl.disabled = (p === voter);

      const labelEl = inputEl.closest('label');
      if (labelEl) {
        labelEl.classList.toggle('disabled', p === voter);
      }
    });
  });
});

/* =========================
   SUBMIT
   ========================= */
document.getElementById('submitBtn').addEventListener('click', async ()=>{
  const voter = document.getElementById('voterSelect').value;
  if(!voter){ alert('Seleziona il tuo nome'); return; }

  const votes = {};
  const missing = [];

  for(let qi=0; qi<questions.length; qi++){
    const radios = document.getElementsByName('q'+qi);
    let chosen = null;
    for(const r of radios) if(r.checked) chosen = r.value;

    if(!chosen){
      missing.push({ index: qi, title: questions[qi] });
    }
    votes['q'+qi] = chosen || null;
  }

  document.querySelectorAll('.question').forEach((el, idx)=>{
    el.classList.toggle('missing', missing.some(m=>m.index===idx));
  });

  if(missing.length){
    const lines = missing.map(m => `${m.index+1}. ${m.title}`);
    alert('Ti sei dimenticato di rispondere a:\n\n' + lines.join('\n'));
    document.querySelector('.question.missing')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  for (let qi=0; qi<questions.length; qi++){
    const chosen = votes['q'+qi];
    if (chosen && chosen.toLowerCase() === voter.toLowerCase()) {
      alert('Non puoi votare te stesso.');
      return;
    }
  }

  try {
    const res = await fetch(WEB_APP_URL, {
      method:'POST',
      body: JSON.stringify({ voter, votes })
    });
    const j = await res.json();

    if(j.ok){
      alert('Voto registrato');
      clearSelections();
      fetchResults();
    } else {
      alert('Errore: '+(j.error||''));
    }

  } catch(e){
    alert('Errore di rete.');
    console.error(e);
  }
});

/* =========================
   RESET
   ========================= */
document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(confirm('Vuoi resettare le selezioni?')) clearSelections();
});

function clearSelections(){
  document.getElementById('voterSelect').value = '';
  document.querySelectorAll('input[type=radio]').forEach(i=> i.checked=false);
  document.getElementById('voterSelect').dispatchEvent(new Event('change'));
}

/* =========================
   RISULTATI
   ========================= */
let charts = {};

async function fetchResults(){
  try {
    const url = WEB_APP_URL + '?action=results&_=' + Date.now();
    const r = await fetch(url, { cache: 'no-store' });
    const data = await r.json();
    renderResults(data);
  } catch(e){
    console.error('fetchResults error', e);
  }
}

function renderResults(data){
  const resultsDiv = document.getElementById('results');
  resultsDiv.innerHTML = '';

  Object.keys(data).forEach(qk=>{
    const qi = parseInt(qk.replace('q',''));

    const container = document.createElement('div');
    container.className='result-card card';

    const title = document.createElement('h4');
    title.textContent = (qi+1)+'. ' + questions[qi];
    container.appendChild(title);

    const canvas = document.createElement('canvas');
    canvas.id = 'chart_'+qk;
    canvas.width=300; canvas.height=200;
    container.appendChild(canvas);

    const legend = document.createElement('div');
    legend.className='legend';

    data[qk].forEach(item=>{
      const li = document.createElement('div');
      li.className='legend-item';

      const dot = document.createElement('span');
      dot.className='dot';
      dot.style.background=colorMap[item.name];

      const txt = document.createElement('span');
      txt.textContent = `${item.name} — ${item.percent.toFixed(1)}% (${item.count})`;

      li.appendChild(dot);
      li.appendChild(txt);
      legend.appendChild(li);
    });

    container.appendChild(legend);
    resultsDiv.appendChild(container);

    const ctx = canvas.getContext('2d');
    const labels = data[qk].map(d=>d.name);
    const counts = data[qk].map(d=>d.count);
    const bg = data[qk].map(d=>colorMap[d.name]);

    if(charts[qk]){
      charts[qk].data.datasets[0].data = counts;
      charts[qk].update();
    } else {
      charts[qk] = new Chart(ctx, {
        type:'pie',
        data:{ labels, datasets:[{ data: counts, backgroundColor: bg }]},
        options:{
          responsive:true,
          plugins:{
            tooltip:{
              callbacks:{
                label: function(context){
                  const idx = context.dataIndex;
                  const name = context.label;
                  const percent = data[qk][idx].percent.toFixed(1);
                  return `${name}: ${percent}%`;
                }
              }
            },
            legend:{ display:false }
          }
        }
      });
    }
  });
}

/* =========================
   INIT
   ========================= */
buildUI();
fetchResults();
setInterval(fetchResults, REFRESH_INTERVAL_MS);

// Aggiorna classe visiva quando cambia lo stato dei radio
document.querySelectorAll('.option input[type=radio]').forEach(input=>{
  input.addEventListener('change', function(){
    // rimuovi .selected da tutte le label dello stesso gruppo (opzionale)
    const group = this.name;
    document.querySelectorAll('input[name="'+group+'"]').forEach(i=>{
      const lab = i.closest('.option');
      if(lab) lab.classList.toggle('selected', i.checked);
    });
  });
});

// Se usi il delegato che forza la selezione, assicurati che aggiunga la classe
(function(){
  function onDocClick(e){
    const elAtPoint = document.elementFromPoint(e.clientX, e.clientY);
    const label = (elAtPoint && elAtPoint.closest && elAtPoint.closest('.option')) || (e.target && e.target.closest && e.target.closest('.option'));
    if(!label) return;
    const input = label.querySelector('input[type=radio]');
    if(!input || input.disabled) return;
    input.checked = true;
    input.dispatchEvent(new Event('change', { bubbles: true }));
    // aggiungi classe visiva
    label.classList.add('selected');
  }
  document.addEventListener('click', onDocClick, true);
})();

// Fetch risultati: aggiungi cache-buster per evitare risposte memorizzate
async function fetchResults(){
  try {
    const url = WEB_APP_URL + '?action=results&_=' + Date.now();
    const r = await fetch(url, { cache: 'no-store' });
    const data = await r.json();
    renderResults(data);
  } catch(e){
    console.error('fetchResults error', e);
  }
}
// Mantieni l'intervallo esistente (REFRESH_INTERVAL_MS)


/* =========================
   Palette e sfondi rilassanti
   ========================= */
:root{
  --bg-start: #071029;
  --bg-end:   #0b1220;
  --card-bg: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  --muted: #9aa4c0;
  --accent: #6C8EAD;    /* blu-grigio rilassante */
  --accent-2: #8FB7D6;
  --success: #7FB77E;
  --danger:  #FF7B7B;
  --card-contrast: rgba(255,255,255,0.03);
  --radius: 12px;
}

/* Base */
html,body{background:linear-gradient(180deg,var(--bg-start),var(--bg-end)); color:#e6eef8}
.form-area, .results-area, .question, .result-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  border: 1px solid var(--card-contrast);
}

/* =========================
   Bottoni più visibili e morbidi
   ========================= */
.btn.primary{
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  color: #fff;
  box-shadow: 0 8px 24px rgba(79,120,150,0.14);
  border: none;
  transition: transform .12s ease, box-shadow .12s ease;
}
.btn.primary:active{ transform: translateY(1px); }
.btn.ghost{
  background: transparent;
  color: var(--muted);
  border: 1px solid rgba(255,255,255,0.04);
}

/* =========================
   Opzioni e stato selezionato
   ========================= */
/* Assicura che la label sia cliccabile e limita pointer-events ai figli utili */
.options { position: relative; z-index: 0; }
.option { position: relative; z-index: 3; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; padding:8px; border-radius:8px; transition: background .12s ease, transform .08s ease; }
.option * { pointer-events: none; } /* evita che figli intercettino il click */
.option input, .option .dot, .option .opt-text { pointer-events: auto; }

/* input invisibile ma interattivo */
.option input { position:absolute; opacity:0; width:1px; height:1px; margin:0; padding:0; pointer-events:auto; }

/* dot e testo */
.option .dot{ width:12px; height:12px; border-radius:50%; display:inline-block; flex:0 0 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.25); }
.option .opt-text{ font-size:13px; color:#e6eef8; font-weight:600; margin-left:6px; }

/* Hover leggero */
.option:hover{ background: rgba(143,183,214,0.03); transform: translateY(-2px); }

/* Stato selezionato: regole sia per input:checked sia per classe .selected (JS) */
.option input:checked + .dot {
  transform: scale(1.08);
  box-shadow: 0 6px 18px rgba(0,0,0,0.45), 0 0 0 6px rgba(143,183,214,0.06);
  border: 2px solid rgba(255,255,255,0.04);
}
.option input:checked + .dot + .opt-text,
.option.selected .opt-text {
  font-weight: 800;
  color: #ffffff;
  text-decoration: none;
}
.option.selected {
  background: rgba(143,183,214,0.06);
  box-shadow: 0 8px 20px rgba(0,0,0,0.28);
  transform: translateY(-3px);
}

/* =========================
   Evidenziazione domande mancanti
   ========================= */
.question.missing {
  border-color: rgba(255,123,123,0.28);
  box-shadow: 0 6px 18px rgba(255,123,123,0.06);
  background: linear-gradient(180deg, rgba(255,123,123,0.02), transparent);
}

/* =========================
   Risultati: leggibilità e nascondi domanda 29
   ========================= */
.result-card h4{ margin:0 0 8px 0; font-size:15px; color:#eaf2ff; }

/* Nasconde eventuali card dei risultati per q28/q29 (fallback visivo)
   Usa selector :has (supportato nei browser moderni). */
.result-card:has(canvas[id="chart_q28"]),
.result-card:has(canvas[id="chart_q29"]) {
  display: none !important;
}

/* Fallback aggiuntivo: se il canvas ha id che inizia con chart_q28 o chart_q29 */
canvas[id^="chart_q28"], canvas[id^="chart_q29"] {
  display: none !important;
}
canvas[id^="chart_q28"] ~ .legend,
canvas[id^="chart_q29"] ~ .legend {
  display: none !important;
}

/* Migliora leggibilità della legenda */
.legend-item{ color:#e6eef8; font-size:13px; display:flex; gap:8px; align-items:center; }

/* =========================
   Accessibilità e riduzione animazioni
   ========================= */
@media (prefers-reduced-motion: reduce){
  .option, .btn { transition: none !important; transform: none !important; }
}

/* =========================
   Utility
   ========================= */
.hidden { display:none !important; }

<script src="chart-loader.js"></script>
<script src="chart-init.js"></script>

</script>
</body>
</html>
